name: Tests

on:
  push:
    branches: [master, feat/*, fix/*]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install pydantic
      - name: Run tests
        run: python tests/run_all_tests.py --verbose
